name: StreamFlow Analytics CI/CD

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run E2E tests"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.11"
  JAVA_VERSION: "11"
  STREAMFLOW_ENV: ci

jobs:
  # ===========================================================================
  # 1. Code Quality
  # ===========================================================================
  lint:
    name: "🔍 Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install black isort flake8 mypy

      - name: Check formatting (black)
        run: black --check src/ tests/ data/ --line-length=100

      - name: Check import ordering (isort)
        run: isort --check-only src/ tests/ --profile=black

      - name: Lint (flake8)
        run: flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,E501,W503

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true   # non-blocking for now

  # ===========================================================================
  # 2. Security Scan
  # ===========================================================================
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Security scan (bandit)
        run: bandit -r src/ -ll --skip B101,B311

  # ===========================================================================
  # 3. Unit Tests
  # ===========================================================================
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java (for PySpark)
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -m "unit" \
            -n auto
        env:
          SPARK_LOCAL_IP: 127.0.0.1

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 80

  # ===========================================================================
  # 4. Integration Tests
  # ===========================================================================
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate CI synthetic data (small)
        run: |
          python data/synthetic/generator.py \
            --start-date 2024-01-01 \
            --end-date 2024-01-31 \
            --companies 2000 \
            --output-path ./data/ci_raw

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --tb=short \
            -m "integration" \
            --timeout=300
        env:
          SPARK_LOCAL_IP: 127.0.0.1
          DATA_PATH: ./data/ci_raw

  # ===========================================================================
  # 5. Data Quality Validation (synthetic data)
  # ===========================================================================
  dq-validation:
    name: "✅ Data Quality Check"
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate synthetic data + run pipeline
        run: |
          python data/synthetic/generator.py \
            --start-date 2024-01-01 \
            --end-date 2024-01-31 \
            --companies 5000 \
            --output-path ./data/dq_raw
          ./scripts/run_pipeline.sh \
            --start-date 2024-01-01 \
            --end-date 2024-01-31 \
            --env local \
            --data-path ./data/dq_raw
        env:
          SPARK_LOCAL_IP: 127.0.0.1

      - name: Run DQ checks
        run: |
          python src/dq/dq_checks.py \
            --all \
            --data-path ./data/dq_output
        env:
          SPARK_LOCAL_IP: 127.0.0.1

  # ===========================================================================
  # 6. dbt Validation
  # ===========================================================================
  dbt-check:
    name: "📐 dbt Compile & Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-spark dbt-core

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile (validate SQL syntax)
        working-directory: dbt
        run: dbt compile --profiles-dir .
        env:
          DBT_TARGET: ci

  # ===========================================================================
  # 7. Terraform Validation
  # ===========================================================================
  terraform-validate:
    name: "🏗️ Terraform Validate"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform format check
        run: terraform fmt -check -recursive infrastructure/

      - name: Terraform init (dry run)
        run: terraform -chdir=infrastructure/terraform/environments/prod init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform/environments/prod validate

  # ===========================================================================
  # 8. Docker Build Validation
  # ===========================================================================
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t streamflow-api:ci .

      - name: Run API smoke test
        run: |
          docker run -d -p 8000:8000 --name api-test streamflow-api:ci
          sleep 5
          curl -f http://localhost:8000/v1/health
          docker stop api-test

  # ===========================================================================
  # 9. E2E Tests (manual trigger or main branch)
  # ===========================================================================
  e2e-tests:
    name: "🌐 E2E Pipeline Tests"
    runs-on: ubuntu-latest
    needs: [integration-tests, dq-validation]
    if: github.ref == 'refs/heads/main' || github.event.inputs.run_e2e == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -v \
            --tb=short \
            -m "e2e" \
            --timeout=600
        env:
          SPARK_LOCAL_IP: 127.0.0.1
          STREAMFLOW_ENV: ci

  # ===========================================================================
  # 10. Deploy (on main merge)
  # ===========================================================================
  deploy-dev:
    name: "🚀 Deploy to Dev"
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, dq-validation, terraform-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Upload scripts to S3
        run: |
          aws s3 sync src/ s3://streamflow-analytics-dev-scripts/src/ \
            --exclude "__pycache__/*" --exclude "*.pyc"

      - name: Notify Slack
        if: always()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "${{ job.status == '\''success'\'' && '\''✅'\'' || '\''❌'\'' }} *StreamFlow Analytics* — Deploy to Dev ${{ job.status }}",
              "blocks": [{
                "type": "section",
                "text": {"type": "mrkdwn", "text": "Branch: `${{ github.ref_name }}` | Commit: `${{ github.sha }}`"}
              }]
            }'

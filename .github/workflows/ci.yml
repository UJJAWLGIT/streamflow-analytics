name: CI — StreamFlow Analytics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black

      - name: Run flake8
        run: |
          flake8 src/ --max-line-length=120 \
            --ignore=E501,W503,E302,E303,F401 \
            --exclude=__pycache__
        continue-on-error: true

      - name: Check formatting
        run: black --check src/ --line-length=120
        continue-on-error: true

  validate:
    name: Project Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Verify key files exist
        run: |
          echo "Checking project structure..."
          test -f README.md          && echo "✅ README.md"
          test -f requirements.txt   && echo "✅ requirements.txt"
          test -f Makefile           && echo "✅ Makefile"
          test -f docker-compose.yml && echo "✅ docker-compose.yml"
          test -d src/utils          && echo "✅ src/utils/"
          test -d src/silver         && echo "✅ src/silver/"
          test -d src/gold           && echo "✅ src/gold/"
          test -d src/ml             && echo "✅ src/ml/"
          test -d airflow/dags       && echo "✅ airflow/dags/"
          test -d dbt/models         && echo "✅ dbt/models/"
          test -d infrastructure     && echo "✅ infrastructure/"
          test -d tests              && echo "✅ tests/"
          echo "✅ All structure checks passed!"

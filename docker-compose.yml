# =============================================================================
# StreamFlow Analytics — Local Development Stack
# =============================================================================
# Services: Airflow + Spark + MLflow + Grafana + Prometheus + FastAPI + MinIO
#
# Usage:
#   docker-compose up -d
#   Airflow:   http://localhost:8080  (admin/admin)
#   MLflow:    http://localhost:5000
#   Grafana:   http://localhost:3000  (admin/admin)
#   FastAPI:   http://localhost:8000/docs
#   MinIO:     http://localhost:9001  (minioadmin/minioadmin)
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: streamflow_local_secret
    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD","pg_isready","-U","airflow"]
      interval: 10s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD","curl","--fail","http://localhost:8080/health"]
      interval: 30s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db init &&
        airflow users create --username admin --password admin
          --firstname Ujjawl --lastname Kumar --role Admin --email admin@streamflow.io
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    command: >
      mlflow server
        --backend-store-uri postgresql://airflow:airflow@postgres/mlflow
        --default-artifact-root s3://streamflow-mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    ports: ["5000:5000"]
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    depends_on: [postgres, minio]

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports: ["8000:8000"]
    environment:
      ENV: local
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes: [./src:/app/src]
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  prometheus:
    image: prom/prometheus:v2.48.0
    ports: ["9090:9090"]
    volumes: [./docker/prometheus.yml:/etc/prometheus/prometheus.yml]

  grafana:
    image: grafana/grafana:10.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana-dashboards:/etc/grafana/provisioning/dashboards

  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    command: server /data --console-address ":9001"
    ports: ["9000:9000","9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:9000/minio/health/live"]
      interval: 30s

volumes:
  postgres_data:
  airflow_logs:
  grafana_data:
  minio_data:
